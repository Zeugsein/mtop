name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Build
        run: cargo build --verbose

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test --verbose

      - name: Contamination check
        run: |
          if [ -f guard/forbidden-patterns.txt ]; then
            guard/scripts/grep-forbidden.sh src/ guard/forbidden-patterns.txt
          else
            echo "No forbidden-patterns.txt found, skipping contamination check"
          fi
